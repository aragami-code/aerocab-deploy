services:
  # ─── NestJS API ───────────────────────────────────────────────
  - type: web
    name: aerocab-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: aerocab-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: aerocab-redis
          type: redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: "*"
      # À remplir manuellement dans le dashboard Render :
      # - key: SMS_API_KEY        (Twilio ou autre)
      # - key: AVIATIONSTACK_KEY
      # - key: CINETPAY_API_KEY
      # - key: CINETPAY_SITE_ID

  # ─── Redis ────────────────────────────────────────────────────
  - type: redis
    name: aerocab-redis
    plan: free
    maxmemoryPolicy: allkeys-lru

databases:
  # ─── PostgreSQL ───────────────────────────────────────────────
  - name: aerocab-db
    databaseName: aerocab
    user: aerocab
    plan: free
