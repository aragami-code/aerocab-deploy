services:
  # ─── NestJS API ───────────────────────────────────────────────
  - type: web
    name: aerogo-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: aerogo-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: aerogo-redis
          type: redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: "https://aerogo-admin.vercel.app"
        # Ajouter d'autres origines séparées par virgule si nécessaire
      # À remplir manuellement dans le dashboard Render :
      # - key: SMS_API_KEY        (Twilio ou autre)
      # - key: AVIATIONSTACK_KEY
      # - key: CINETPAY_API_KEY
      # - key: CINETPAY_SITE_ID

  # ─── Redis ────────────────────────────────────────────────────
  - type: redis
    name: aerogo-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

databases:
  # ─── PostgreSQL ───────────────────────────────────────────────
  - name: aerogo-db
    databaseName: aerogo
    user: aerogo
    plan: free
